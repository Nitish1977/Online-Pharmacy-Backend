server.port=8080
spring.application.name=api-gateway

# ─── Service Routes (lb:// uses Eureka for discovery) ──────────────────────────

# Identity Service — public (no JWT filter)
spring.cloud.gateway.routes[0].id=identity-service
spring.cloud.gateway.routes[0].uri=lb://identity-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Catalog Service — protected
spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=lb://catalog-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/catalog/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# Order Service — protected
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# Admin Service — protected
spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://admin-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# ─── Swagger API-Docs Routes — NO AuthenticationFilter, NO JWT required ────────
# These must have NO filters so Swagger UI can fetch them freely
spring.cloud.gateway.routes[4].id=identity-service-docs
spring.cloud.gateway.routes[4].uri=lb://identity-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/identity/api-docs,/identity/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/identity(?<segment>/?.*), $\{segment}

spring.cloud.gateway.routes[5].id=catalog-service-docs
spring.cloud.gateway.routes[5].uri=lb://catalog-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/catalog/api-docs,/catalog/api-docs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/catalog(?<segment>/?.*), $\{segment}

spring.cloud.gateway.routes[6].id=order-service-docs
spring.cloud.gateway.routes[6].uri=lb://order-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/order/api-docs,/order/api-docs/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/order(?<segment>/?.*), $\{segment}

spring.cloud.gateway.routes[7].id=admin-service-docs
spring.cloud.gateway.routes[7].uri=lb://admin-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/admin/api-docs,/admin/api-docs/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/admin(?<segment>/?.*), $\{segment}

# ─── CORS ──────────────────────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*

# ─── Eureka Client ─────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=pharmacy-secret-key-for-jwt-must-be-at-least-32-chars-long!

# ─── Centralized Swagger UI ────────────────────────────────────────────────────
# Opens at: http://localhost:8080/swagger-ui.html
# Use the top-right dropdown to switch between services
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Identity Service
springdoc.swagger-ui.urls[0].url=/identity/api-docs
springdoc.swagger-ui.urls[1].name=Catalog Service
springdoc.swagger-ui.urls[1].url=/catalog/api-docs
springdoc.swagger-ui.urls[2].name=Order Service
springdoc.swagger-ui.urls[2].url=/order/api-docs
springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/admin/api-docs
springdoc.swagger-ui.urls-primary-name=Identity Service

# ─── Zipkin Tracing ──────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
