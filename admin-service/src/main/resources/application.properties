server.port=8084
spring.application.name=admin-service

# ─── Primary datasource — Orders DB (pharmacy_orders) ──────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacy_orders?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tiger
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── Secondary datasource — Catalog DB (pharmacy_catalog) ──────────────────
catalog.datasource.url=jdbc:mysql://localhost:3306/pharmacy_catalog?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
catalog.datasource.username=root
catalog.datasource.password=tiger
catalog.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT ────────────────────────────────────────────────────────────────────
jwt.secret=pharmacy-secret-key-for-jwt-must-be-at-least-32-chars-long!

# ─── Eureka Client ──────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ─── Swagger / OpenAPI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ─── Zipkin Tracing ──────────────────────────────────────────────────────────
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
